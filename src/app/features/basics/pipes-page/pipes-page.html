<div class="space-y-10">

  <!-- HERO -->
  <section
    class="rounded-3xl bg-slate-900 p-10"
  >
    <span
      class="rounded-full bg-emerald-500/10
             px-4 py-2 text-emerald-300"
    >
      {{ hero.badge }}
    </span>

    <h1
      class="mt-5 text-5xl font-black text-white"
    >
      {{ hero.title }}
    </h1>

    <p class="mt-4 text-slate-300">
      {{ hero.subtitle }}
    </p>
  </section>

  <!-- PIPE TYPES -->
  <section class="grid gap-6 md:grid-cols-2">

    @for (pipe of pipeTypes; track pipe.title) {

      <div
        class="rounded-3xl border border-white/10
               bg-slate-900 p-8"
      >

        <div class="text-4xl">
          {{ pipe.icon }}
        </div>

        <h2
          class="mt-5 text-3xl font-bold text-white"
        >
          {{ pipe.title }}
        </h2>

        <p class="mt-4 text-slate-300">
          {{ pipe.description }}
        </p>

        <pre
          class="mt-6 overflow-x-auto rounded-2xl
                 bg-black/40 p-5 text-sm text-cyan-300"
        ><code>{{ pipe.code }}</code></pre>

      </div>

    }

  </section>

  <!-- INTERVIEW QUESTIONS -->
  <section class="space-y-5">

    @for (item of interviewQuestions; track item.question) {

      <div
        class="rounded-3xl bg-slate-900 p-6"
      >

        <h3
          class="text-xl font-bold text-cyan-300"
        >
          {{ item.question }}
        </h3>

        <p class="mt-4 text-slate-300">
          {{ item.answer }}
        </p>

      </div>

    }

  </section>

</div>
